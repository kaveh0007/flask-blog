{% extends 'layout.html' %}
{% block content %}
<article class="media content-section">
    <div class="media-body">
        <div class="article-metadata">
            <img class="rounded-circle post-img" src={{ url_for("serve_image", 
            filename=post.author.image_file) if post.author.image_file !="default.jpg" 
            else url_for("static", filename="assets/default.jpg" ) }}>
            <a class="mr-2" href="#">{{ post.author.username }}</a>
            <small class="text-muted">{{ post.date_posted.strftime("%Y/%m/%d") }}</small>
            {% if post.author == current_user %}
            <a class="update-btn btn btn-secondary btn-sm mt-1 mb-1" href={{ url_for("update_post", post_id=post.id) }}>Update</a>
            {%  endif %}
        </div>
        <h2 class="article-title">{{ post.title }}</h2>
        <p class="article-content">{{ post.content }}</p>
    </div>
</article>
{% endblock content %}
